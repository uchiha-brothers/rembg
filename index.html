<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AnimeStream</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
}

.controls{
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select,button{
padding:10px;
background:#1a1a1a;
border:1px solid #333;
color:white;
}

button{
cursor:pointer;
}

.section{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.card{
background:#151515;
border-radius:6px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.04);
}

.card video{
width:100%;
height:140px;
object-fit:cover;
}

.card p{
padding:10px;
margin:0;
font-size:14px;
}

.latest{
display:flex;
gap:10px;
overflow-x:auto;
}

.latest-card{
min-width:200px;
background:#151515;
cursor:pointer;
}

.latest-card video{
width:100%;
height:120px;
object-fit:cover;
}

.latest-card p{
padding:8px;
margin:0;
font-size:13px;
}

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
z-index:100;
display:none;
}

</style>

</head>
<body>

<header>
<h2>AnimeStream</h2>
</header>

<div class="controls">

<input id="title" placeholder="Video title">

<input type="file" id="video" accept="video/*">

<button onclick="upload()">Upload</button>

<select id="sort" onchange="sortVideos()">
<option value="latest">Latest</option>
<option value="az">A-Z</option>
<option value="random">Random</option>
</select>

</div>

<div class="section">

<h3>Latest Uploads</h3>

<div class="latest" id="latest"></div>

</div>

<div class="section">

<h3>All Videos</h3>

<div class="grid" id="grid"></div>

</div>

<div id="loading">Uploading Video...</div>

<script>

let videos=[]

const grid=document.getElementById("grid")
const latest=document.getElementById("latest")
const loading=document.getElementById("loading")

async function load(){

const res=await fetch("/api/videos")

videos=await res.json()

showLatest()

sortVideos()

}

function showLatest(){

latest.innerHTML=""

const last5=[...videos].slice(0,5)

last5.forEach(v=>{

const card=document.createElement("div")

card.className="latest-card"

card.innerHTML=`
<video src="${v.url}" muted></video>
<p>${v.title}</p>
`

card.onclick=()=>play(v)

latest.appendChild(card)

})

}

function sortVideos(){

let sorted=[...videos]

const type=document.getElementById("sort").value

if(type==="az"){

sorted.sort((a,b)=>a.title.localeCompare(b.title))

}

if(type==="latest"){

sorted.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))

}

if(type==="random"){

sorted.sort(()=>Math.random()-0.5)

}

grid.innerHTML=""

sorted.forEach(v=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
<video src="${v.url}" muted></video>
<p>${v.title}</p>
`

card.onclick=()=>play(v)

grid.appendChild(card)

})

}

function play(v){

const player=window.open()

player.document.write(`

<html>

<body style="margin:0;background:black">

<video src="${v.url}" controls autoplay style="width:100%;height:100%"></video>

</body>

</html>

`)

}

async function upload(){

const title=document.getElementById("title").value

const video=document.getElementById("video").files[0]

if(!title||!video){

alert("Missing data")

return

}

loading.style.display="flex"

const form=new FormData()

form.append("title",title)
form.append("video",video)

await fetch("/api/videos",{
method:"POST",
body:form
})

loading.style.display="none"

document.getElementById("title").value=""
document.getElementById("video").value=""

load()

}

load()

</script>

</body>
</html>
