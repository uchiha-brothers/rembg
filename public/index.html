<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AnimeStream</title>
<style>
:root {
  --bg-color: #0f0f0f;
  --text-color: white;
  --card-bg: #151515;
  --header-bg: #111;
  --input-bg: #1a1a1a;
}
[data-theme="light"] {
  --bg-color: #f5f5f5;
  --text-color: #111;
  --card-bg: #fff;
  --header-bg: #ddd;
  --input-bg: #eee;
}
body{
  background: var(--bg-color);
  color: var(--text-color);
  font-family: Arial,sans-serif;
  margin:0;
}
header{
  background: var(--header-bg);
  padding: 15px;
  display:flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap:wrap;
}
header h2{
  margin:0;
}
.navbar{
  display:flex;
  gap:15px;
  align-items:center;
  flex-wrap:wrap;
}
.navbar input[type="text"]{
  padding:6px 10px;
  border-radius:4px;
  border:1px solid #333;
  background: var(--input-bg);
  color: var(--text-color);
}
button{
  cursor:pointer;
  padding:8px 12px;
  border:none;
  border-radius:4px;
  background:#1a1a1a;
  color:white;
}
.controls{
  padding:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
input[type="file"],input[type="text"]{
  padding:10px;
  background: var(--input-bg);
  border:1px solid #333;
  color: var(--text-color);
  border-radius:4px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background: var(--card-bg);
  cursor:pointer;
  transition:.2s;
  border-radius:6px;
  overflow:hidden;
}
.card:hover{transform:scale(1.05);}
.card video{width:100%;height:140px;object-fit:cover;}
.card p{padding:10px;margin:0;}
.latest{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:20px;
}
.latest video{
  width:200px;
  height:120px;
  object-fit:cover;
}
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  z-index:100;
  display:none;
}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .latest video{width:140px;height:100px;}
}
</style>
</head>
<body data-theme="dark">
<header>
  <h2>AnimeStream</h2>
  <div class="navbar">
    <button onclick="toggleTheme()">🌙 / ☀️</button>
    <input type="text" id="search" placeholder="Search videos..." oninput="filterVideos()">
    <button onclick="showUploadForm()">Upload</button>
  </div>
</header>

<div class="controls" id="uploadControls" style="display:none">
  <input id="title" placeholder="Video Title">
  <input type="file" id="video" accept="video/*">
  <button onclick="upload()">Upload</button>
  <select id="sort" onchange="sortVideos()">
    <option value="latest">Latest</option>
    <option value="az">A-Z</option>
    <option value="random">Random</option>
  </select>
</div>

<h3 style="padding-left:20px">Latest Uploads</h3>
<div class="latest" id="latest"></div>

<h3 style="padding-left:20px">All Videos</h3>
<div class="grid" id="grid"></div>

<div id="loading">Uploading Video...</div>

<script>
let videos=[]
const grid=document.getElementById("grid")
const latest=document.getElementById("latest")
const loading=document.getElementById("loading")
const searchInput=document.getElementById("search")
const uploadControls=document.getElementById("uploadControls")

function toggleTheme(){
  const body=document.body
  body.dataset.theme= body.dataset.theme==="dark"?"light":"dark"
}

function showUploadForm(){
  uploadControls.style.display = uploadControls.style.display==="none"?"flex":"none"
}

async function load(){
  try{
    const res=await fetch("/api/videos")
    videos = await res.json()
    showLatest()
    sortVideos()
  }catch(e){console.error("Load failed:",e)}
}

function showLatest(){
  latest.innerHTML=""
  videos.slice(0,5).forEach(v=>{
    const div=document.createElement("div")
    div.innerHTML=`<video src="${v.url}" muted></video><p>${v.title}</p>`
    div.onclick=()=>play(v)
    latest.appendChild(div)
  })
}

function sortVideos(){
  let sorted=[...videos]
  const type=document.getElementById("sort").value
  if(type==="az") sorted.sort((a,b)=>a.title.localeCompare(b.title))
  if(type==="random") sorted.sort(()=>Math.random()-0.5)
  if(type==="latest") sorted.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))
  grid.innerHTML=""
  sorted.forEach(v=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerHTML=`<video src="${v.url}" muted></video><p>${v.title}</p>`
    card.onclick=()=>play(v)
    grid.appendChild(card)
  })
}

function filterVideos(){
  const query=searchInput.value.toLowerCase()
  let filtered = videos.filter(v=>v.title.toLowerCase().includes(query))
  grid.innerHTML=""
  filtered.forEach(v=>{
    const card=document.createElement("div")
    card.className="card"
    card.innerHTML=`<video src="${v.url}" muted></video><p>${v.title}</p>`
    card.onclick=()=>play(v)
    grid.appendChild(card)
  })
}

function play(v){
  const win=window.open()
  win.document.write(`<body style="margin:0;background:black"><video src="${v.url}" controls autoplay style="width:100%;height:100%"></video></body>`)
}

async function upload(){
  const title=document.getElementById("title").value
  const file=document.getElementById("video").files[0]
  if(!title){ alert("Missing title"); return }

  loading.style.display="flex"
  let url="https://cdnfile.pages.dev/mylove.mp4" // fallback url

  try{
    if(file){
      const formData=new FormData()
      formData.append("reqtype","fileupload")
      formData.append("fileToUpload",file)
      const catbox=await fetch("https://catbox.moe/user/api.php",{method:"POST",body:formData})
      const text=await catbox.text()
      if(text && text.includes("http")) url=text.trim()
    }
  }catch(e){console.warn("Catbox failed, using fallback URL",e)}

  try{
    const res=await fetch("/api/videos",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title,url})
    })
    const data=await res.json()
    if(data.error) alert("Supabase error: "+data.error)
  }catch(e){console.error("Supabase save failed",e)}

  loading.style.display="none"
  document.getElementById("title").value=""
  document.getElementById("video").value=""
  load()
}

load()
</script>
</body>
</html>
